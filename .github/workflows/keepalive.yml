name: Supabase Keepalive

on:
  schedule:
    - cron: '0 12 */5 * *'   # every 5 days at 12:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ vars.SUPABASE_URL }}/rest/v1/scores?select=id&limit=1" \
            -H "apikey: ${{ vars.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ vars.SUPABASE_ANON_KEY }}")
          echo "Supabase ping status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "406" ]; then
            echo "Unexpected status $STATUS"
            exit 1
          fi
